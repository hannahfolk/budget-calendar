<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0a0e27"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="url(#bgGrad)"/>
  
  <!-- Calendar grid lines -->
  <line x1="8" y1="10" x2="24" y2="10" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
  <line x1="8" y1="22" x2="24" y2="22" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
  <line x1="12" y1="7" x2="12" y2="25" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
  <line x1="20" y1="7" x2="20" y2="25" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Dollar sign coin - blue -->
  <circle cx="22" cy="22" r="8" fill="url(#coinGrad)" stroke="#bae6fd" stroke-width="1"/>
  <text x="22" y="26" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0c4a6e" text-anchor="middle">$</text>
  
  <!-- Green income indicator -->
  <circle cx="10" cy="13" r="2" fill="#34d399"/>
  
  <!-- Red expense indicator -->
  <circle cx="16" cy="19" r="2" fill="#f87171"/>
</svg>
